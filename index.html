<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Mark Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Student Mark Checker</h1>

    <p>Enter a student's details below to check their result.</p>

    <label for="studentName">Student Name:</label>
    <input type="text" id="studentName" placeholder="Enter student name">

    <br><br>

    <label for="studentMark">Student Mark:</label>
    <input type="number" id="studentMark" placeholder="Enter student mark">

    <br><br>

    <button onclick="checkMark()">CHECK MARK</button>
<div id="result"></div>

<hr>

<h2>LIST OF STUDENTS WHO SUBMITTED</h2>

<ul id="studentList"></ul>

<script src="script.js"></script>
</body>
</html>
